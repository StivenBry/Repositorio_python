<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Terapias - Sincronizado con Drive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/lucide.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); transition: all 0.2s; }
        .card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
        .tab-active { border-bottom: 2px solid #3b82f6; color: #3b82f6; }
        .scroll-hide::-webkit-scrollbar { display: none; }
        .view-btn-active { background-color: white !important; color: #2563eb !important; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .view-btn-inactive { color: #64748b !important; }
        #toast {
            visibility: hidden; min-width: 250px; margin-left: -125px; background-color: #334155;
            color: #fff; text-align: center; border-radius: 12px; padding: 16px;
            position: fixed; z-index: 100; left: 50%; bottom: 30px; font-size: 14px;
            font-weight: 600;
        }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="toast">Datos actualizados</div>

    <div class="max-w-6xl mx-auto">
        <!-- Configuración de Enlace Drive -->
        <div class="mb-8 p-6 bg-white rounded-3xl border border-slate-200 shadow-sm">
            <h2 class="text-sm font-bold text-slate-800 mb-4 flex items-center gap-2">
                <i data-lucide="link" class="w-4 h-4 text-blue-600"></i> Enlace de Google Sheets (CSV)
            </h2>
            <div class="flex flex-col md:flex-row gap-3">
                <input type="text" id="sheetUrl" placeholder="Pega aquí el enlace de 'Publicar en la web' (formato CSV)" 
                       class="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="syncFromSheets()" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold text-sm hover:bg-blue-700 transition flex items-center justify-center gap-2">
                    <i data-lucide="refresh-cw" class="w-4 h-4" id="sync-icon"></i> Sincronizar Ahora
                </button>
            </div>
            <p class="text-[10px] text-slate-400 mt-3">Para obtener el link: Archivo > Compartir > Publicar en la Web > CSV.</p>
        </div>

        <!-- Header y Navegación (Igual que antes) -->
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-slate-800 tracking-tight">Panel de Control</h1>
                <p class="text-slate-500 font-medium" id="status-text">Listo para trabajar</p>
            </div>
            <div class="flex bg-slate-100 p-1.5 rounded-2xl w-fit shadow-inner">
                <button id="btn-view-list" onclick="switchView('list')" class="px-6 py-2 rounded-xl text-sm font-bold transition view-btn-active">Pacientes</button>
                <button id="btn-view-calendar" onclick="switchView('calendar')" class="px-6 py-2 rounded-xl text-sm font-bold transition view-btn-inactive">Agenda</button>
            </div>
        </div>

        <!-- Contenedores de Vista -->
        <div id="view-list" class="block">
            <div id="patientsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

        <div id="view-calendar" class="hidden">
            <div class="bg-white rounded-3xl p-8 border border-slate-100 shadow-sm" id="calendarContent"></div>
        </div>

        <div id="emptyState" class="hidden text-center py-20">
            <i data-lucide="database" class="w-12 h-12 text-slate-200 mx-auto mb-4"></i>
            <p class="text-slate-400">No hay datos cargados desde el enlace.</p>
        </div>
    </div>

    <script>
        window.patients = [];
        
        function initIcons() { if (window.lucide) lucide.createIcons(); }

        // --- SINCRONIZACIÓN CON GOOGLE SHEETS ---
        async function syncFromSheets() {
            const url = document.getElementById('sheetUrl').value;
            if (!url) { alert("Por favor, pega un enlace válido."); return; }
            
            const btnIcon = document.getElementById('sync-icon');
            btnIcon.classList.add('animate-spin');
            
            localStorage.setItem('saved_sheet_url', url);

            Papa.parse(url, {
                download: true,
                header: true,
                complete: function(results) {
                    processData(results.data);
                    btnIcon.classList.remove('animate-spin');
                    showToast("Sincronización completa");
                },
                error: function() {
                    alert("Error al acceder al enlace. Asegúrate de que el archivo esté 'Publicado en la web' como CSV.");
                    btnIcon.classList.remove('animate-spin');
                }
            });
        }

        function processData(data) {
            window.patients = data.filter(row => row.Nombre || row.Paciente).map((row, index) => {
                const tFisica = parseInt(row['T. FISICA'] || 0);
                const tOcupacional = parseInt(row['T. OCUPACIONAL'] || 0);
                const tRespira = parseInt(row['T.RESPIRA'] || 0);
                
                return {
                    id: index,
                    nombre: row.Nombre || row.Paciente,
                    direccion: row.Direccion || row.Dirección || "",
                    horario: localStorage.getItem(`h_${index}`) || "", // Persistencia local de horarios
                    completadas: parseInt(localStorage.getItem(`c_${index}`)) || 0,
                    totalSesiones: tFisica + tOcupacional + tRespira,
                    grupo: (row.Direccion || "").toLowerCase().includes('circasia') ? 'circasia' : 'otros'
                };
            });
            renderPatients();
            document.getElementById('status-text').innerText = "Datos sincronizados desde Drive";
        }

        // --- RENDERIZADO Y LÓGICA ---
        function renderPatients() {
            const grid = document.getElementById('patientsGrid');
            if (window.patients.length === 0) {
                document.getElementById('emptyState').classList.remove('hidden');
                grid.innerHTML = '';
                return;
            }
            document.getElementById('emptyState').classList.add('hidden');
            
            grid.innerHTML = window.patients.map(p => {
                const perc = p.totalSesiones > 0 ? Math.round((p.completadas / p.totalSesiones) * 100) : 0;
                return `
                    <div class="card p-6 border border-slate-100 flex flex-col h-full">
                        <div class="flex-grow">
                            <h3 class="font-bold text-slate-800 text-lg mb-1 truncate">${p.nombre}</h3>
                            <p class="text-xs text-slate-400 mb-4 truncate">${p.direccion}</p>
                            <input type="text" value="${p.horario}" onchange="saveTime(${p.id}, this.value)" placeholder="Asignar hora..." 
                                   class="w-full bg-slate-50 border border-slate-100 rounded-xl px-3 py-2 text-sm font-medium mb-4 focus:outline-none">
                        </div>
                        <div class="mt-auto">
                            <div class="flex justify-between text-[10px] mb-1 font-bold text-slate-500">
                                <span>PROGRESO</span>
                                <span>${p.completadas}/${p.totalSesiones}</span>
                            </div>
                            <div class="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden">
                                <div class="bg-blue-500 h-full transition-all" style="width:${perc}%"></div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            initIcons();
        }

        function saveTime(id, val) {
            localStorage.setItem(`h_${id}`, val);
            window.patients[id].horario = val;
            showToast("Hora guardada localmente");
        }

        function switchView(view) {
            document.getElementById('view-list').classList.toggle('hidden', view !== 'list');
            document.getElementById('view-calendar').classList.toggle('hidden', view !== 'calendar');
            document.getElementById('btn-view-list').className = view === 'list' ? "px-6 py-2 rounded-xl text-sm font-bold transition view-btn-active" : "px-6 py-2 rounded-xl text-sm font-bold transition view-btn-inactive";
            document.getElementById('btn-view-calendar').className = view === 'calendar' ? "px-6 py-2 rounded-xl text-sm font-bold transition view-btn-active" : "px-6 py-2 rounded-xl text-sm font-bold transition view-btn-inactive";
        }

        function showToast(m) {
            const t = document.getElementById("toast");
            t.innerText = m; t.className = "show";
            setTimeout(() => t.className = "", 3000);
        }

        // Cargar link guardado al iniciar
        window.onload = () => {
            const savedUrl = localStorage.getItem('saved_sheet_url');
            if (savedUrl) {
                document.getElementById('sheetUrl').value = savedUrl;
                syncFromSheets();
            }
            initIcons();
        };
    </script>
</body>
</html>
