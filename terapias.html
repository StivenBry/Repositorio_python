<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Terapias - Sincronización Total</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/lucide.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); transition: all 0.2s; }
        .card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
        .view-btn-active { background-color: white !important; color: #2563eb !important; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .view-btn-inactive { color: #64748b !important; }
        #toast {
            visibility: hidden; min-width: 250px; margin-left: -125px; background-color: #334155;
            color: #fff; text-align: center; border-radius: 12px; padding: 16px;
            position: fixed; z-index: 100; left: 50%; bottom: 30px; font-size: 14px;
            font-weight: 600;
        }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="toast">Datos guardados en la nube</div>

    <div class="max-w-6xl mx-auto">
        <!-- Configuración de Enlace Drive -->
        <div class="mb-8 p-6 bg-white rounded-3xl border border-slate-200 shadow-sm">
            <h2 class="text-sm font-bold text-slate-800 mb-4 flex items-center gap-2">
                <i data-lucide="link" class="w-4 h-4 text-blue-600"></i> Enlace de Google Sheets (CSV)
            </h2>
            <div class="flex flex-col md:flex-row gap-3">
                <input type="text" id="sheetUrl" placeholder="Pega aquí el enlace de 'Publicar en la web' (formato CSV)" 
                       class="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none">
                <button onclick="syncFromSheets()" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold text-sm hover:bg-blue-700 transition flex items-center justify-center gap-2">
                    <i data-lucide="refresh-cw" class="w-4 h-4" id="sync-icon"></i> Sincronizar Excel
                </button>
            </div>
        </div>

        <!-- Header -->
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-slate-800 tracking-tight">Control de Pacientes</h1>
                <p class="text-slate-500 font-medium" id="status-text">Conectando con la base de datos...</p>
            </div>
            <div class="flex bg-slate-100 p-1.5 rounded-2xl w-fit shadow-inner">
                <button id="btn-view-list" onclick="switchView('list')" class="px-6 py-2 rounded-xl text-sm font-bold transition view-btn-active">Pacientes</button>
                <button id="btn-view-calendar" onclick="switchView('calendar')" class="px-6 py-2 rounded-xl text-sm font-bold transition view-btn-inactive">Agenda</button>
            </div>
        </div>

        <div id="view-list" class="block">
            <div id="patientsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

        <div id="view-calendar" class="hidden">
            <div class="bg-white rounded-3xl p-8 border border-slate-100 shadow-sm" id="calendarContent"></div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, signInAnonymously, getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // Firebase Config
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-terapia-app';

        let currentUser = null;
        let cloudData = {};

        // Auth
        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                setupPersistence();
            }
        });

        function setupPersistence() {
            const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'appData', 'state');
            onSnapshot(docRef, (snapshot) => {
                if (snapshot.exists()) {
                    cloudData = snapshot.data();
                    if (window.patients.length > 0) applyCloudData();
                }
                document.getElementById('status-text').innerText = "Sincronizado con la nube";
            });
        }

        window.saveState = async () => {
            if (!currentUser) return;
            const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'appData', 'state');
            const dataToSave = {};
            window.patients.forEach(p => {
                dataToSave[p.uniqueId] = {
                    horario: p.horario,
                    completadas: p.completadas
                };
            });
            await setDoc(docRef, dataToSave);
            showToast("Progreso guardado");
        };

        window.applyCloudData = () => {
            window.patients.forEach(p => {
                if (cloudData[p.uniqueId]) {
                    p.horario = cloudData[p.uniqueId].horario || "";
                    p.completadas = cloudData[p.uniqueId].completadas || 0;
                }
            });
            renderPatients();
        };

        initAuth();
    </script>

    <script>
        window.patients = [];
        
        function initIcons() { if (window.lucide) lucide.createIcons(); }

        async function syncFromSheets() {
            const url = document.getElementById('sheetUrl').value;
            if (!url) return;
            localStorage.setItem('saved_sheet_url', url);
            
            Papa.parse(url, {
                download: true,
                header: true,
                complete: function(results) {
                    processData(results.data);
                }
            });
        }

        function processData(data) {
            window.patients = data.filter(row => row.Nombre || row.Paciente).map((row, index) => {
                const nombre = row.Nombre || row.Paciente;
                const tFisica = parseInt(row['T. FISICA'] || 0);
                const tOcupacional = parseInt(row['T. OCUPACIONAL'] || 0);
                const tRespira = parseInt(row['T.RESPIRA'] || 0);
                
                return {
                    id: index,
                    uniqueId: btoa(nombre).substring(0, 15), // ID único basado en el nombre para vincular datos nube
                    nombre: nombre,
                    direccion: row.Direccion || row.Dirección || "",
                    horario: "",
                    completadas: 0,
                    totalSesiones: tFisica + tOcupacional + tRespira
                };
            });
            if (window.applyCloudData) window.applyCloudData();
        }

        function renderPatients() {
            const grid = document.getElementById('patientsGrid');
            grid.innerHTML = window.patients.map(p => {
                const perc = p.totalSesiones > 0 ? Math.round((p.completadas / p.totalSesiones) * 100) : 0;
                return `
                    <div class="card p-6 border border-slate-100">
                        <h3 class="font-bold text-slate-800 truncate">${p.nombre}</h3>
                        <p class="text-xs text-slate-400 mb-4">${p.direccion}</p>
                        <div class="flex gap-2 mb-4">
                            <input type="text" value="${p.horario}" onchange="updateLocal(${p.id}, 'horario', this.value)" 
                                   class="flex-1 bg-slate-50 border rounded-lg px-2 py-1 text-sm" placeholder="Hora">
                            <button onclick="addSession(${p.id})" class="bg-emerald-100 text-emerald-600 px-3 py-1 rounded-lg text-xs font-bold">+1</button>
                        </div>
                        <div class="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden">
                            <div class="bg-blue-500 h-full transition-all" style="width:${perc}%"></div>
                        </div>
                    </div>
                `;
            }).join('');
            initIcons();
        }

        function updateLocal(id, field, val) {
            window.patients[id][field] = val;
            if (window.saveState) window.saveState();
        }

        function addSession(id) {
            if (window.patients[id].completadas < window.patients[id].totalSesiones) {
                window.patients[id].completadas++;
                if (window.saveState) window.saveState();
            }
        }

        function switchView(view) {
            document.getElementById('view-list').classList.toggle('hidden', view !== 'list');
            document.getElementById('view-calendar').classList.toggle('hidden', view !== 'calendar');
        }

        function showToast(m) {
            const t = document.getElementById("toast");
            t.innerText = m; t.className = "show";
            setTimeout(() => t.className = "", 3000);
        }

        window.onload = () => {
            const url = localStorage.getItem('saved_sheet_url');
            if (url) {
                document.getElementById('sheetUrl').value = url;
                syncFromSheets();
            }
        };
    </script>
</body>
</html>
